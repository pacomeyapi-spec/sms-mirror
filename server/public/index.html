<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMS Mirror</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:#1565C0}
.login-card{background:#fff;border-radius:12px;padding:40px;width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-card h1{color:#1565C0;font-size:24px;margin-bottom:8px}
.login-card p{color:#666;margin-bottom:24px;font-size:14px}
.login-card input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:14px;outline:none}
.login-card input:focus{border-color:#1565C0}
.login-card button{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.login-card button:hover{background:#0d47a1}
.login-error{color:#e53e3e;font-size:13px;margin-top:8px}

/* HEADER */
#appHeader{background:#1565C0;color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#appHeader h1{font-size:20px;font-weight:700}
#appHeader .header-right{display:flex;align-items:center;gap:12px}
#appHeader .badge-total{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px;font-size:13px}
#logoutBtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px}
#logoutBtn:hover{background:rgba(255,255,255,.25)}

/* LAYOUT */
#mainLayout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:300px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
#sidebarSearch{padding:12px;border-bottom:1px solid #e2e8f0}
#sidebarSearch input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#f8f9fa}
#sidebarSearch input:focus{border-color:#1565C0}
#senderList{overflow-y:auto;flex:1}
.sender-section-label{padding:8px 16px 4px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;background:#f8f9fa;border-bottom:1px solid #e2e8f0}
.sender-item{display:flex;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .15s}
.sender-item:hover{background:#f0f7ff}
.sender-item.active{background:#e3f2fd;border-left:3px solid #1565C0}
.sender-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;margin-right:12px}
.sender-info{flex:1;min-width:0}
.sender-name{font-weight:600;font-size:14px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sender-preview{font-size:12px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.sender-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sender-count{background:#1565C0;color:#fff;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700}
.sender-unread{background:#ef4444;color:#fff;border-radius:12px;padding:2px 7px;font-size:11px;font-weight:700}

/* MAIN CONTENT */
#mainContent{flex:1;display:flex;flex-direction:column;overflow:hidden}
#contentHeader{background:#fff;padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
#contentHeader h2{font-size:16px;font-weight:700;color:#1e293b}
#contentHeader span{font-size:13px;color:#94a3b8}
#messageList{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
#emptyState{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8}
#emptyState .icon{font-size:48px;margin-bottom:12px}
#emptyState p{font-size:15px}

/* MESSAGE CARD */
.msg-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:background .2s,border .2s;border:2px solid transparent}
.msg-card.status-approuve{background:#f0fdf4;border-color:#22c55e}
.msg-card.status-pas_de_commande{background:#fef2f2;border-color:#ef4444}
.msg-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.msg-type-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#e0f2fe;color:#0369a1;text-transform:uppercase;flex-shrink:0}
.msg-type-badge.sms{background:#e0f2fe;color:#0369a1}
.msg-type-badge.notification{background:#fef9c3;color:#854d0e}
.msg-type-badge.call{background:#ede9fe;color:#6d28d9}
.msg-content{font-size:14px;color:#1e293b;line-height:1.5;word-break:break-word}
.msg-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.msg-date{font-size:12px;color:#94a3b8}
.msg-status-area{display:flex;align-items:center;gap:8px}
.status-indicator{font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px}
.status-indicator.approuve{background:#dcfce7;color:#15803d}
.status-indicator.pas_de_commande{background:#fee2e2;color:#b91c1c}
.status-btn{position:relative}
.status-btn button{background:#f8fafc;border:1px solid #e2e8f0;color:#475569;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
.status-btn button:hover{background:#e2e8f0}
.status-dropdown{position:absolute;right:0;bottom:32px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;min-width:160px;overflow:hidden;display:none}
.status-dropdown.open{display:block}
.status-dropdown button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;text-align:left}
.status-dropdown button:hover{background:#f8fafc}
.status-dropdown button.opt-approuve{color:#15803d}
.status-dropdown button.opt-approuve:hover{background:#f0fdf4}
.status-dropdown button.opt-pas_de_commande{color:#b91c1c}
.status-dropdown button.opt-pas_de_commande:hover{background:#fef2f2}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* LOADING */
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#1565C0;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* COLORS FOR AVATARS */
.c0{background:#1565C0}.c1{background:#7c3aed}.c2{background:#0891b2}.c3{background:#15803d}.c4{background:#b45309}.c5{background:#be185d}.c6{background:#0f766e}.c7{background:#6d28d9}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>📱 SMS Mirror</h1>
    <p>Tableau de bord en temps réel</p>
    <input type="password" id="pwdInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Connexion</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex:1;flex-direction:column;height:100vh">
  <div id="appHeader">
    <h1>📱 SMS Mirror</h1>
    <div class="header-right">
      <span id="totalBadge" class="badge-total">0 messages</span>
      <button id="logoutBtn" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div id="mainLayout">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebarSearch">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher un expéditeur..." oninput="filterSenders()"/>
      </div>
      <div id="senderList"><div class="spinner"></div></div>
    </div>
    <!-- CONTENT -->
    <div id="mainContent">
      <div id="contentHeader">
        <h2 id="contentTitle">Sélectionnez un expéditeur</h2>
        <span id="contentCount"></span>
      </div>
      <div id="messageList">
        <div id="emptyState">
          <div class="icon">💬</div>
          <p>Cliquez sur un expéditeur pour voir ses messages</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PINNED = ['Wave Business', '+454', 'MobileMoney', 'MoovMoney'];
let TOKEN = localStorage.getItem('sm_token') || '';
let allSenders = [];
let activeSender = null;
let activeMessages = [];
let socket = null;

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  try {
    const r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Mot de passe incorrect'; return; }
    TOKEN = d.token;
    localStorage.setItem('sm_token', TOKEN);
    showApp();
  } catch(e) { err.textContent = 'Erreur de connexion'; }
}
function doLogout() {
  TOKEN = ''; localStorage.removeItem('sm_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}
function authHeaders() { return {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}; }

// ─── Initialisation ───────────────────────────────────────────────────────────
async function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadSenders();
  connectSocket();
}

function connectSocket() {
  socket = io();
  socket.on('new_messages', (msgs) => {
    loadSenders();
    if (activeSender) {
      const relevant = msgs.filter(m =>
        (m.sender_name||m.sender||m.app_name||'Inconnu') === activeSender ||
        m.sender === activeSender || m.app_name === activeSender
      );
      if (relevant.length) { relevant.forEach(m => prependMessage(m)); }
    }
  });
  socket.on('message_status_updated', ({id, status}) => {
    const card = document.getElementById('card-'+id);
    if (card) applyStatus(card, status);
    const msg = activeMessages.find(m => m.id === id);
    if (msg) msg.status = status;
  });
}

// ─── Senders ─────────────────────────────────────────────────────────────────
async function loadSenders() {
  try {
    const r = await fetch('/api/senders', {headers: authHeaders()});
    if (r.status === 401) { doLogout(); return; }
    const senders = await r.json();
    allSenders = senders;
    // Mettre à jour total
    const total = senders.reduce((s,x)=>s+x.count,0);
    document.getElementById('totalBadge').textContent = total + ' messages';
    renderSenders(senders);
  } catch(e) { console.error(e); }
}

function avatarColor(name) {
  let h = 0; for(let i=0;i<name.length;i++) h = (h*31+name.charCodeAt(i))%8;
  return 'c'+h;
}
function avatarLetter(name) { return (name||'?')[0].toUpperCase(); }

function renderSenders(senders) {
  const list = document.getElementById('senderList');
  const pinned = senders.filter(s => PINNED.includes(s.display_name));
  const others = senders.filter(s => !PINNED.includes(s.display_name));

  // S'assurer que tous les PINNED apparaissent (même si 0 message)
  const pinnedAll = PINNED.map(name => {
    const found = pinned.find(s => s.display_name === name);
    return found || {display_name: name, count: 0, unread: 0, last_ts: 0, type: 'sms'};
  });

  let html = '';
  html += '<div class="sender-section-label">📌 Épinglés</div>';
  pinnedAll.forEach(s => { html += senderItemHTML(s); });
  if (others.length) {
    html += '<div class="sender-section-label">Tous les expéditeurs (' + others.length + ')</div>';
    others.forEach(s => { html += senderItemHTML(s); });
  }
  list.innerHTML = html;
  // Re-highlight active
  if (activeSender) {
    const el = list.querySelector('[data-sender="'+CSS.escape(activeSender)+'"]');
    if (el) el.classList.add('active');
  }
}

function senderItemHTML(s) {
  const name = s.display_name;
  const active = name === activeSender ? ' active' : '';
  const esc = name.replace(/"/g,'&quot;');
  const lastMsg = s.count > 0 ? s.count + ' message' + (s.count>1?'s':'') : 'Aucun message';
  return `<div class="sender-item${active}" data-sender="${esc}" onclick="selectSender('${esc}')">
    <div class="sender-avatar ${avatarColor(name)}">${avatarLetter(name)}</div>
    <div class="sender-info">
      <div class="sender-name">${esc}</div>
      <div class="sender-preview">${lastMsg}</div>
    </div>
    <div class="sender-meta">
      <span class="sender-count">${s.count}</span>
      ${s.unread > 0 ? '<span class="sender-unread">'+s.unread+'</span>' : ''}
    </div>
  </div>`;
}

function filterSenders() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderSenders(allSenders); return; }
  const filtered = allSenders.filter(s => s.display_name.toLowerCase().includes(q));
  renderSenders(filtered);
}

// ─── Messages ─────────────────────────────────────────────────────────────────
async function selectSender(name) {
  activeSender = name;
  // Update active state in sidebar
  document.querySelectorAll('.sender-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector('[data-sender="'+CSS.escape(name)+'"]');
  if (el) el.classList.add('active');

  document.getElementById('contentTitle').textContent = name;
  document.getElementById('messageList').innerHTML = '<div class="spinner"></div>';

  try {
    const r = await fetch('/api/messages?sender='+encodeURIComponent(name)+'&limit=200', {headers: authHeaders()});
    const d = await r.json();
    activeMessages = d.messages || [];
    document.getElementById('contentCount').textContent = activeMessages.length + ' message' + (activeMessages.length>1?'s':'');
    renderMessages(activeMessages);
    // Mark as read
    if (activeMessages.length) {
      const unreadIds = activeMessages.filter(m=>!m.is_read).map(m=>m.id);
      if (unreadIds.length) {
        fetch('/api/messages/read',{method:'POST',headers:authHeaders(),body:JSON.stringify({ids:unreadIds})});
        loadSenders();
      }
    }
  } catch(e) { console.error(e); }
}

function renderMessages(msgs) {
  const list = document.getElementById('messageList');
  if (!msgs.length) {
    list.innerHTML = '<div id="emptyState"><div class="icon">📭</div><p>Aucun message</p></div>';
    return;
  }
  list.innerHTML = msgs.map(m => messageCardHTML(m)).join('');
}

function messageCardHTML(m) {
  const statusClass = m.status ? 'status-'+m.status : '';
  const d = new Date(m.timestamp);
  const dateStr = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
  const content = m.content || (m.call_type ? 'Appel ' + m.call_type + (m.call_duration?' ('+m.call_duration+'s)':'') : '(vide)');
  const statusLabel = m.status === 'approuve' ? '<span class="status-indicator approuve">✅ Approuvé</span>'
    : m.status === 'pas_de_commande' ? '<span class="status-indicator pas_de_commande">❌ Pas de commande</span>' : '';
  return `<div class="msg-card ${statusClass}" id="card-${m.id}">
    <div class="msg-card-top">
      <div style="flex:1">
        <span class="msg-type-badge ${m.type}">${m.type === 'sms' ? 'SMS' : m.type === 'notification' ? 'Notif' : 'Appel'}</span>
      </div>
    </div>
    <div class="msg-content">${escHtml(content)}</div>
    <div class="msg-footer">
      <span class="msg-date">📅 ${dateStr}</span>
      <div class="msg-status-area">
        ${statusLabel}
        <div class="status-btn" id="sbtn-${m.id}">
          <button onclick="toggleDropdown('${m.id}')">Statut ▾</button>
          <div class="status-dropdown" id="drop-${m.id}">
            <button class="opt-approuve" onclick="setStatus('${m.id}','approuve')">✅ Approuvé</button>
            <button class="opt-pas_de_commande" onclick="setStatus('${m.id}','pas_de_commande')">❌ Pas de commande</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function prependMessage(m) {
  activeMessages.unshift(m);
  const list = document.getElementById('messageList');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = messageCardHTML(m);
  list.insertBefore(div.firstChild, list.firstChild);
  document.getElementById('contentCount').textContent = activeMessages.length + ' messages';
}

// ─── Status ───────────────────────────────────────────────────────────────────
function toggleDropdown(id) {
  // Close all others
  document.querySelectorAll('.status-dropdown.open').forEach(d => {
    if (d.id !== 'drop-'+id) d.classList.remove('open');
  });
  document.getElementById('drop-'+id).classList.toggle('open');
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.status-btn')) {
    document.querySelectorAll('.status-dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

async function setStatus(id, status) {
  document.getElementById('drop-'+id).classList.remove('open');
  try {
    const r = await fetch('/api/messages/'+id+'/status', {
      method:'PATCH', headers: authHeaders(), body: JSON.stringify({status})
    });
    if (r.ok) {
      const card = document.getElementById('card-'+id);
      applyStatus(card, status);
      const msg = activeMessages.find(m => m.id === id);
      if (msg) msg.status = status;
    }
  } catch(e) { console.error(e); }
}

function applyStatus(card, status) {
  card.className = 'msg-card' + (status ? ' status-'+status : '');
  const area = card.querySelector('.msg-status-area');
  // Update indicator
  const old = area.querySelector('.status-indicator');
  if (old) old.remove();
  if (status === 'approuve') {
    area.insertAdjacentHTML('afterbegin', '<span class="status-indicator approuve">✅ Approuvé</span>');
  } else if (status === 'pas_de_commande') {
    area.insertAdjacentHTML('afterbegin', '<span class="status-indicator pas_de_commande">❌ Pas de commande</span>');
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
if (TOKEN) { showApp(); }
else { document.getElementById('loginScreen').style.display = 'flex'; }
</script>
</body>
</html>
