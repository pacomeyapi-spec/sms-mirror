name: Build SMS Mirror APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build APK Android

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configuration Android SDK
        uses: android-actions/setup-android@v3

      - name: Installation de Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compilation APK Debug
        working-directory: android
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Téléchargement APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: SmsMirror-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Compilation APK Release (non signé)
        working-directory: android
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Téléchargement APK Release
        uses: actions/upload-artifact@v4
        with:
          name: SmsMirror-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
